<title>Gillian &amp; Marianne · The French Alps · Final Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --teal:#1C9DB1;
    --teal-deep:#16808F;
    --ink:#2C2B28;
    --muted:#6F6B64;
    --line:#E7E2D8;
    --sea:#2BA3B4;
    --paper:#F6F2EA;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    margin:0;background:#fff;color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Fraunces",Georgia,serif}
  a{color:var(--teal-deep)}

  /* ---------------- sticky nav ---------------- */
  .tabs{
    position:sticky;top:0;z-index:60;
    background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    display:flex;justify-content:flex-start;gap:2px;
    padding:9px 14px;overflow-x:auto;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  @media(min-width:780px){.tabs{justify-content:center}}
  .tab{
    appearance:none;border:none;background:none;cursor:pointer;
    font-family:"Fraunces",Georgia,serif;font-size:16px;font-weight:500;
    letter-spacing:.01em;color:var(--muted);text-decoration:none;
    padding:8px 2px;margin:0 10px;border-bottom:2px solid transparent;white-space:nowrap;
    transition:.2s;
  }
  .tab:hover{color:var(--teal-deep)}
  .tab.book{color:var(--teal-deep);font-weight:600}
  section[id]{scroll-margin-top:58px}

  /* ---------------- scene pattern ---------------- */
  .scene{position:relative}
  .scene > .bg{position:sticky;top:0;height:100vh;z-index:0;overflow:hidden}
  .scene > .cap{position:absolute;left:0;right:0;z-index:1}
  .scene > .panel{position:relative;z-index:2;background:#fff;min-height:60vh}

  /* ---------------- hero map ---------------- */
  .hero .bg{background:var(--sea)}
  .hero .heromap{position:absolute;inset:0;z-index:0;background:var(--sea)}
  .hero-tint{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,34,40,.55) 0%,rgba(8,34,40,.18) 38%,rgba(8,34,40,.5) 100%);
  }
  .hero .heromap .leaflet-control-attribution{font-size:9px;opacity:.8}
  .hero .cap{top:7vh;text-align:center;color:#fff;padding:0 24px}
  .hero .eyebrow{
    font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    font-weight:600;margin-bottom:12px;opacity:.92;
  }
  .hero h1{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(23px,4.8vw,38px);line-height:1.1;letter-spacing:-.01em;
    margin:0 auto;max-width:14em;text-shadow:0 2px 18px rgba(0,40,46,.4);
  }
  .hero .dates{
    margin-top:13px;font-size:13px;letter-spacing:.04em;font-weight:500;opacity:.95;
  }
  .hero .locked{
    display:inline-block;margin-top:14px;
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    border:1px solid rgba(255,255,255,.65);border-radius:99px;padding:7px 16px;
    backdrop-filter:blur(2px);
  }
  .scrollcue{
    position:absolute;left:50%;bottom:20px;transform:translateX(-50%);
    z-index:2;color:#fff;opacity:.85;font-size:22px;animation:bob 1.8s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}
  @media (prefers-reduced-motion:reduce){.scrollcue{animation:none}}

  /* ---------------- overview ---------------- */
  .section{max-width:720px;margin:0 auto;padding:64px 24px 26px}
  .section h2{
    font-family:"Fraunces",serif;font-weight:500;
    font-size:clamp(30px,6vw,44px);line-height:1.05;margin:0 0 26px;
    color:var(--ink);
  }
  .section p{font-size:17px;line-height:1.85;color:#54514b;margin:0 0 22px}

  /* ---------------- route map ---------------- */
  .routewrap{max-width:720px;margin:6px auto 2px;padding:0 24px 40px}
  .route-label{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin:0 0 12px;
  }
  .routemap{height:380px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:#dfe9ea}
  .routemap .leaflet-control-attribution{font-size:9px}

  /* ---------------- day scene ---------------- */
  .day .bg img{width:100%;height:100%;object-fit:cover;display:block;background:#cfe0e2}
  .day-scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(10,30,34,.20) 0%,rgba(10,30,34,.05) 42%,rgba(10,30,34,.34) 100%);
  }
  .day .cap{
    top:30vh;text-align:center;color:#fff;padding:0 24px;
    text-shadow:0 2px 26px rgba(0,30,36,.5);
  }
  .day .cap .dno{
    font-family:"Fraunces",serif;font-style:italic;font-weight:500;
    font-size:clamp(22px,5vw,30px);margin-bottom:4px;
  }
  .day .cap h3{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(34px,7.6vw,58px);line-height:1.02;margin:0;
  }
  .day .cap .ddate{
    font-family:"Fraunces",serif;font-weight:500;
    font-size:clamp(20px,4.4vw,28px);margin-top:8px;
  }

  /* ---------------- day body ---------------- */
  .day-body{max-width:720px;margin:0 auto;padding:46px 24px 40px}
  .callout{
    background:var(--teal);color:#fff;border-radius:3px;
    padding:20px 22px;font-size:16px;line-height:1.6;margin:0 0 30px;
  }
  .callout.alt{background:#2BB0A4}
  .callout a{color:#fff;font-weight:600}
  .callout .ttl{font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:13.5px;margin-bottom:8px;display:block}
  .ev{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .ev:last-child{border-bottom:none}
  .ev .t{font-weight:600;color:var(--teal-deep);min-width:62px;font-variant-numeric:tabular-nums}
  .ev .d{color:#54514b;font-size:16px;line-height:1.55}
  .opt-h{font-weight:600;margin:28px 0 10px;color:var(--ink)}
  .opt{list-style:none;padding:0;margin:0 0 8px}
  .opt li{
    position:relative;padding:7px 0 7px 22px;color:#54514b;font-size:16px;line-height:1.5;
    border-bottom:1px solid #F1ECE3;
  }
  .opt li::before{content:"–";position:absolute;left:0;color:var(--teal);font-weight:600}

  /* ---------------- gallery ---------------- */
  .gallery-wrap{position:relative;margin:34px 0 10px}
  .gallery{
    display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
    gap:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  .gallery::-webkit-scrollbar{display:none}
  .slide{flex:0 0 100%;scroll-snap-align:center;padding:0;position:relative}
  .slide img{
    width:100%;aspect-ratio:4/5;object-fit:cover;
    display:block;background:#dfe9ea;
  }
  .gallery-wrap::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:96px;z-index:2;
    pointer-events:none;background:linear-gradient(transparent,rgba(8,24,28,.42));
  }
  .dots{
    position:absolute;left:0;right:0;bottom:16px;z-index:3;
    display:flex;justify-content:center;gap:10px;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);
    background:transparent;transition:.2s;cursor:pointer;padding:0;
    box-shadow:0 0 4px rgba(0,0,0,.25);
  }
  .dot.on{background:#fff}
  @media(min-width:780px){.gallery-wrap{max-width:560px;margin-left:auto;margin-right:auto}}

  /* ---------------- NEW: logistics card ---------------- */
  .logi{
    border:1px solid var(--line);border-radius:6px;
    padding:6px 20px 8px;margin:30px 0;
    background:#FCFAF6;
  }
  .logi-h{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;padding:16px 0 6px;
  }
  .leg{
    display:flex;gap:13px;align-items:flex-start;
    padding:14px 0;border-top:1px solid var(--line);
  }
  .leg:first-of-type{border-top:none}
  .mode{
    flex:0 0 auto;margin-top:2px;
    font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    color:#fff;background:var(--teal-deep);border-radius:3px;
    padding:4px 8px;min-width:56px;text-align:center;
  }
  .mode.walk{background:#8FA6A0}
  .mode.cable{background:#2BB0A4}
  .mode.climb{background:#4E8A5A}
  .leg-main{flex:1;min-width:0}
  .leg-title{font-weight:600;font-size:15.5px;color:var(--ink)}
  .leg-desc{font-size:14.5px;color:#54514b;line-height:1.55;margin-top:3px}
  .leg-desc a{font-weight:600;text-decoration-thickness:1px}
  .leg-price{
    flex:0 0 auto;font-variant-numeric:tabular-nums;
    font-weight:600;font-size:14px;color:var(--teal-deep);
    text-align:right;white-space:nowrap;margin-top:2px;
  }
  @media(max-width:520px){
    .leg{flex-wrap:wrap}
    .leg-price{width:100%;text-align:left;padding-left:69px;margin-top:2px}
  }

  /* ---------------- NEW: hotel card ---------------- */
  .stay{
    display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;
    border:1px solid var(--line);border-left:4px solid var(--teal);
    border-radius:6px;padding:18px 20px;margin:26px 0 6px;
  }
  .stay-info{flex:1;min-width:230px}
  .stay-eyebrow{
    font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:5px;
  }
  .stay-name{font-family:"Fraunces",serif;font-weight:600;font-size:21px;line-height:1.15;margin:0 0 4px}
  .stay-why{font-size:14.5px;color:#54514b;line-height:1.55}
  .stay-side{flex:0 0 auto;text-align:right;min-width:150px}
  .stay-price{font-weight:600;color:var(--teal-deep);font-size:15px;font-variant-numeric:tabular-nums}
  .stay-links{margin-top:8px;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
  .stay-links a{font-size:13.5px;font-weight:600}
  @media(max-width:520px){
    .stay-side{text-align:left;width:100%}
    .stay-links{align-items:flex-start}
  }

  /* ---------------- NEW: book-now checklist ---------------- */
  .booknow{background:var(--paper);padding:64px 24px 56px}
  .booknow .inner{max-width:720px;margin:0 auto}
  .booknow h2{
    font-family:"Fraunces",serif;font-weight:500;
    font-size:clamp(28px,5.5vw,40px);margin:0 0 10px;
  }
  .booknow .lede{color:#5a564f;font-size:16px;line-height:1.75;margin:0 0 26px}
  .chk{
    display:flex;gap:14px;align-items:flex-start;
    background:#fff;border:1px solid var(--line);border-radius:6px;
    padding:16px 18px;margin:0 0 12px;cursor:pointer;
    transition:border-color .2s, opacity .2s;
  }
  .chk:hover{border-color:var(--teal)}
  .chk.done{opacity:.55}
  .chk.done .chk-title{text-decoration:line-through}
  .box{
    flex:0 0 auto;width:22px;height:22px;border-radius:5px;margin-top:2px;
    border:2px solid var(--teal-deep);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:14px;font-weight:700;background:#fff;transition:.15s;
  }
  .chk.done .box{background:var(--teal-deep)}
  .chk-main{flex:1;min-width:0}
  .chk-title{font-weight:600;font-size:15.5px;color:var(--ink)}
  .chk-title .urgency{
    font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:#fff;background:#C46A3A;border-radius:3px;padding:2px 7px;margin-left:8px;
    position:relative;top:-1px;white-space:nowrap;
  }
  .chk-desc{font-size:14px;color:#54514b;line-height:1.55;margin-top:4px}
  .chk-desc a{font-weight:600}
  .chk-price{flex:0 0 auto;font-weight:600;color:var(--teal-deep);font-size:14px;white-space:nowrap;margin-top:3px;font-variant-numeric:tabular-nums}
  @media(max-width:520px){
    .chk{flex-wrap:wrap}
    .chk-price{padding-left:36px}
  }
  .budget{
    margin-top:30px;border-top:1px solid #E0D9CB;padding-top:22px;
    font-size:14.5px;color:#5a564f;line-height:1.8;
  }
  .budget strong{color:var(--ink)}

  /* ---------------- closing ---------------- */
  .closing{background:#fff;padding:60px 24px 76px;text-align:center}
  .closing .inner{max-width:620px;margin:0 auto}
  .closing h2{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(26px,5.5vw,38px);margin:0 0 16px}
  .closing p{color:#5a564f;font-size:16px;line-height:1.8;margin:0 0 8px}
  .closing .air{font-size:14px;color:var(--muted);margin-top:18px;line-height:1.7}

  /* ---------------- back to top ---------------- */
  .totop{
    position:fixed;right:16px;bottom:18px;z-index:70;
    width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:var(--teal);color:#fff;font-size:20px;
    box-shadow:0 8px 22px -8px rgba(0,40,46,.6);
    opacity:0;pointer-events:none;transition:.25s;
  }
  .totop.show{opacity:1;pointer-events:auto}
  .totop:focus-visible,.tab:focus-visible,.chk:focus-visible,.dot:focus-visible{outline:2px solid var(--teal-deep);outline-offset:2px}
</style>
</head>

/* =================================================================
   RENDER
================================================================= */
function ev([t,d]){return `<div class="ev"><span class="t">${t}</span><span class="d">${d}</span></div>`;}
function legHTML(l){
  const modeCls = l.mode==="walk"?"mode walk":l.mode==="cable"?"mode cable":l.mode==="climb"?"mode climb":"mode";
  const modeTxt = l.mode==="cable"?"cable car":l.mode==="climb"?"ferrata":l.mode;
  return `<div class="leg">
    <span class="${modeCls}">${modeTxt}</span>
    <div class="leg-main">
      <div class="leg-title">${l.title}</div>
      <div class="leg-desc">${l.desc}</div>
    </div>
    <div class="leg-price">${l.price}</div>
  </div>`;
}
function stayHTML(s){
  return `<div class="stay">
    <div class="stay-info">
      <div class="stay-eyebrow">${s.eyebrow}</div>
      <div class="stay-name serif">${s.name}</div>
      <div class="stay-why">${s.why}</div>
    </div>
    <div class="stay-side">
      <div class="stay-price">${s.price}</div>
      <div class="stay-links">${s.links.map(([label,url])=>`<a href="${url}" target="_blank" rel="noopener">${label} →</a>`).join("")}</div>
    </div>
  </div>`;
}
function galleryHTML(gid, files){
  return `
  <div class="gallery-wrap">
    <div class="gallery" data-gallery="${gid}">
      ${files.map(f=>`<div class="slide"><img loading="lazy" alt="" src="${img(f,1500)}"></div>`).join("")}
    </div>
    <div class="dots" data-dots="${gid}">
      ${files.map((_,i)=>`<button class="dot ${i===0?'on':''}" data-i="${i}" aria-label="Photo ${i+1}"></button>`).join("")}
    </div>
  </div>`;
}
function dayHTML(d){
  return `
  <section class="scene day" id="${d.id}">
    <div class="bg"><img loading="lazy" alt="${d.title.replace(/&amp;/g,'&')}" src="${img(d.bg,2000)}"><div class="day-scrim"></div></div>
    <div class="cap">
      <div class="dno">${d.dno}</div>
      <h3>${d.title}</h3>
      <div class="ddate">${d.date}</div>
    </div>
    <div class="panel">
      <div class="day-body">
        <div class="callout"><span class="ttl">${d.intro.ttl}</span>${d.intro.txt}</div>
        ${galleryHTML(d.id, d.gallery)}
        <div class="logi">
          <div class="logi-h">${d.logi.h}</div>
          ${d.logi.legs.map(legHTML).join("")}
        </div>
        ${d.sched.map(ev).join("")}
        ${stayHTML(d.stay)}
        <div class="opt-h">Options for the day include:</div>
        <ul class="opt">${d.options.map(o=>`<li>${o}</li>`).join("")}</ul>
        <div class="callout ${d.note.cls}"><span class="ttl">${d.note.ttl}</span>${d.note.txt}</div>
      </div>
    </div>
  </section>`;
}
function booknowHTML(b){
  return `
  <section class="booknow" id="booknow">
    <div class="inner">
      <h2 class="serif">Book these now</h2>
      <p class="lede">${b.lede}</p>
      ${b.items.map((it,i)=>`
        <div class="chk${it.done?' done':''}" data-chk="${i}" role="checkbox" aria-checked="${it.done?'true':'false'}" tabindex="0">
          <span class="box" aria-hidden="true">✓</span>
          <div class="chk-main">
            <div class="chk-title">${it.t}<span class="urgency"${it.done?' style="background:#2BB0A4"':''}>${it.u}</span></div>
            <div class="chk-desc">${it.d}</div>
          </div>
          <div class="chk-price">${it.p}</div>
        </div>`).join("")}
      <div class="budget">${b.budget}</div>
    </div>
  </section>`;
}

const MAPS={};
function initHeroMap(){
  const map=L.map("heromap",{
    zoomControl:false,attributionControl:true,
    dragging:false,scrollWheelZoom:false,doubleClickZoom:false,
    boxZoom:false,keyboard:false,touchZoom:false,tap:false
  });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
    {maxZoom:18,attribution:"&copy; OpenStreetMap, &copy; CARTO"}).addTo(map);
  L.polyline(TRIP.returnLine,{color:"#0d3138",weight:2,dashArray:"1 6",opacity:.5}).addTo(map);
  L.polyline(TRIP.routeLine,{color:"#0d3138",weight:2.5,dashArray:"2 7",opacity:.85}).addTo(map);
  TRIP.stops.forEach(s=>{
    L.circleMarker([s[0],s[1]],{radius:5,color:"#0d2127",weight:2,fillColor:"#16808F",fillOpacity:1}).addTo(map);
  });
  const b=L.latLngBounds(TRIP.routeLine.concat(TRIP.returnLine)).pad(0.3);
  map.fitBounds(b);
  MAPS.hero={map,b};
}
function initRouteMap(){
  const map=L.map("rmap",{scrollWheelZoom:false,zoomControl:true});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:18,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);
  L.polyline(TRIP.returnLine,{color:"#16808F",weight:2.5,dashArray:"1 7",opacity:.55}).addTo(map)
    .bindTooltip("The drive home · Sat 15 Aug",{sticky:true});
  L.polyline(TRIP.routeLine,{color:"#16808F",weight:3,dashArray:"3 8",opacity:.95}).addTo(map);
  TRIP.stops.forEach(s=>{
    L.circleMarker([s[0],s[1]],{radius:6,color:"#0d2127",weight:2,fillColor:"#16808F",fillOpacity:1})
      .addTo(map).bindTooltip(s[2],{direction:"top",offset:[0,-6]});
  });
  // Beaune dinner-stop marker on the return leg
  L.circleMarker([47.02,4.84],{radius:5,color:"#0d2127",weight:2,fillColor:"#C46A3A",fillOpacity:1})
    .addTo(map).bindTooltip("BEAUNE · dinner stop",{direction:"top",offset:[0,-6]});
  const b=L.latLngBounds(TRIP.routeLine.concat(TRIP.returnLine)).pad(0.2);
  map.fitBounds(b);
  MAPS.route={map,b};
}
if(window.L){ initHeroMap(); initRouteMap(); }

/* graceful image fallback */
document.querySelectorAll("img").forEach(im=>{
  im.addEventListener("error",()=>{ im.style.background="linear-gradient(135deg,#cfe0e2,#a9c9cd)"; im.removeAttribute("src"); im.style.objectFit="cover"; });
});

/* galleries */
document.querySelectorAll("[data-gallery]").forEach(g=>{
  const key=g.dataset.gallery;
  const dots=document.querySelector(`[data-dots="${key}"]`);
  const dotEls=[...dots.children];
  let raf=null;
  g.addEventListener("scroll",()=>{
    if(raf)return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const slide=g.querySelector(".slide");
      const w=slide?slide.getBoundingClientRect().width:g.clientWidth;
      const idx=Math.round(g.scrollLeft/w);
      dotEls.forEach((d,i)=>d.classList.toggle("on",i===idx));
    });
  },{passive:true});
  dotEls.forEach(d=>d.addEventListener("click",()=>{
    const slide=g.querySelector(".slide");
    const w=slide?slide.getBoundingClientRect().width:g.clientWidth;
    g.scrollTo({left:w*(+d.dataset.i),behavior:"smooth"});
  }));
});

/* checklist (in-memory only — resets on reload) */
document.querySelectorAll(".chk").forEach(c=>{
  function toggle(){
    const done=c.classList.toggle("done");
    c.setAttribute("aria-checked",done?"true":"false");
  }
  c.addEventListener("click",e=>{ if(e.target.closest("a"))return; toggle(); });
  c.addEventListener("keydown",e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();} });
});

/* back to top */
const totop=document.getElementById("totop");
window.addEventListener("scroll",()=>{ totop.classList.toggle("show",window.scrollY>600); },{passive:true});
totop.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
